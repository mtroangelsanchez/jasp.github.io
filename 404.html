<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página No Encontrada | JASP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1c2e3a 0%, #2a4a5a 50%, #1c3a3a 100%);
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 600px; }
        h1 { font-size: 6rem; color: #0d9e71; margin-bottom: 10px; }
        h2 { font-size: 1.5rem; margin-bottom: 20px; font-weight: 400; }
        p { color: rgba(255,255,255,0.7); margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            background: #0d9e71;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #0a7d5a;
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(13, 158, 113, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Página No Encontrada</h2>
        <p>Lo siento, la página que buscas no existe o ha sido movida.</p>
        <a href="/" class="btn">Volver al Inicio</a>
    </div>
</body>
</html>
